<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gas Composition Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/deck.gl@8.9.28/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/core@8.9.28/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/layers@8.9.28/dist.min.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    #tooltip {
      position: absolute;
      background: white;
      padding: 4px;
      font-size: 13px;
      border: 1px solid gray;
      display: none;
      pointer-events: none;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 8px;
      border: 1px solid gray;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="tooltip"></div>

  <div id="controls">
    <label for="basinSelect">Basin:</label>
    <select id="basinSelect">
      <option value="Permian_Basin">Permian Basin</option>
      <option value="Anadarko_Basin">Anadarko Basin</option>
    </select>
    <label for="componentSelect">Component:</label>
    <select id="componentSelect">
      <option value="C1">C1</option>
      <option value="std_C1">std_C1</option>
    </select>
    <button id="loadButton">Load</button>
  </div>

  <script>
    const { DeckGL, MapView } = deck;
    const { GeoJsonLayer } = deck;
    const gridSize = 2000;
    const tooltip = document.getElementById('tooltip');

    const deckgl = new DeckGL({
      container: 'map',
      views: [new MapView({ repeat: true })],
      controller: true,
      initialViewState: {
        longitude: -102,
        latitude: 38,
        zoom: 5
      },
      layers: []
    });

    function getColor(value) {
      if (value > 90) return [128, 0, 38];
      if (value > 75) return [189, 0, 38];
      if (value > 60) return [227, 26, 28];
      if (value > 45) return [252, 78, 42];
      if (value > 30) return [253, 141, 60];
      if (value > 15) return [254, 217, 118];
      if (value > 5)  return [255, 255, 178];
      return [255, 255, 204];
    }

    async function loadMapData(basinKey, component) {
      const basinName = basinKey.replace(/_/g, ' ');
      const csvPath = `datasets_latlon/${basinKey}/dataset_${component}_epsg4326.csv`;
      const response = await fetch(csvPath);
      const csv = await response.text();

      const lines = csv.trim().split('\n').slice(1);
      const features = [];

      const half = gridSize / 2 / 111320;

      for (const line of lines) {
        const [lon, lat, val] = line.split(',').map(Number);
        if (isNaN(lon) || isNaN(lat) || isNaN(val)) continue;

        const poly = [
          [lon - half, lat - half],
          [lon + half, lat - half],
          [lon + half, lat + half],
          [lon - half, lat + half],
          [lon - half, lat - half]
        ];

        features.push({
          type: "Feature",
          properties: { value: val },
          geometry: { type: "Polygon", coordinates: [poly] }
        });
      }

      const geojson = { type: "FeatureCollection", features };

      const dataLayer = new GeoJsonLayer({
        id: 'data-layer',
        data: geojson,
        filled: true,
        stroked: false,
        getFillColor: d => getColor(d.properties.value),
        pickable: true,
        opacity: 0.7,
        onHover: info => {
          if (info.object) {
            tooltip.style.display = 'block';
            tooltip.style.left = `${info.x}px`;
            tooltip.style.top = `${info.y}px`;
            tooltip.innerHTML = `Value: ${info.object.properties.value.toFixed(3)}`;
          } else {
            tooltip.style.display = 'none';
          }
        }
      });

      // Add basin boundary layer
      const boundaryRes = await fetch("basins_boundaries.geojson");
      const boundaryJson = await boundaryRes.json();
      const filtered = boundaryJson.features.filter(f => f.properties.BASIN_NAME === basinName);

      const basinLayer = new GeoJsonLayer({
        id: 'basin-boundary-layer',
        data: { type: "FeatureCollection", features: filtered },
        stroked: true,
        filled: false,
        getLineColor: [0, 0, 0],
        getLineWidth: 150
      });

      deckgl.setProps({ layers: [dataLayer, basinLayer] });
    }

    document.getElementById('loadButton').addEventListener('click', () => {
      const basin = document.getElementById('basinSelect').value;
      const component = document.getElementById('componentSelect').value;
      loadMapData(basin, component);
    });

    loadMapData('Permian_Basin', 'C1');
  </script>
</body>
</html>
