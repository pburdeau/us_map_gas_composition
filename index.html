<!DOCTYPE html>
<html>
<head>
    <title>Pixelated Map with Basins</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="width: 100%; height: 600px;"></div>
    <script>
        var map = L.map('map').setView([30.0, -98.5], 6);

        // Basemap options
        var basemaps = {
            "Streets": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }),
            "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri'
            }),
            "Light Background": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB'
            }),
            "Dark Mode": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB'
            })
        };

        basemaps["Streets"].addTo(map); // Default basemap

        // Layer control to switch backgrounds
        L.control.layers(basemaps).addTo(map);

        // Function to get color based on C1 value
        function getColor(value) {
            return value > 0.75 ? '#800026' :
                   value > 0.5  ? '#BD0026' :
                   value > 0.25 ? '#E31A1C' :
                                 '#FFEDA0';
        }

        var gridSize = 0.05; // Approximate grid size in degrees

        // Load dataset from CSV dynamically
        fetch('dataset.csv')
            .then(response => response.text())
            .then(data => {
                var rows = data.split('\n').slice(1); // Skip header
                rows.forEach(row => {
                    var cols = row.split(',');
                    if (cols.length < 3) return;
                    var lat = parseFloat(cols[1]);
                    var lon = parseFloat(cols[0]);
                    var c1 = parseFloat(cols[2]);
                    
                    var bounds = [
                        [lat - gridSize / 2, lon - gridSize / 2],
                        [lat + gridSize / 2, lon + gridSize / 2]
                    ];
                    
                    L.rectangle(bounds, {
                        color: getColor(c1),
                        fillColor: getColor(c1),
                        fillOpacity: 0.7,
                        weight: 0
                    }).addTo(map).bindPopup("C1 value: " + c1.toFixed(3));
                });
            });

        // Load basin boundaries from GeoJSON
        fetch('basins.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: 'black',
                        weight: 2,
                        fillOpacity: 0
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
