<!DOCTYPE html>
<html>
<head>
    <title>Gas Composition Map by Basin</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([38, -102], 6);
        const bounds = L.latLngBounds([]);

        const gridSize = 0.05;

        const baseLayers = {
            "Streets": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }),
            "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri'
            }),
            "Light": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB'
            }),
            "Dark": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB'
            })
        };

        baseLayers["Streets"].addTo(map);
        L.control.layers(baseLayers).addTo(map);

        function getColor(value) {
            return value > 90 ? '#800026' :
                   value > 75 ? '#BD0026' :
                   value > 60 ? '#E31A1C' :
                   value > 45 ? '#FC4E2A' :
                   value > 30 ? '#FD8D3C' :
                   value > 15 ? '#FEB24C' :
                   value > 5  ? '#FED976' :
                                '#FFEDA0';
        }

        const basins = [
            "Permian_Basin", "Anadarko_Basin", "Appalachian_Basin", "San_Joaquin_Basin"
            // Add more basin folder names here as needed
        ];

        const components = [
            'C1', 'std_C1', 'CO2', 'std_CO2', 'HE', 'std_HE', 'H2', 'std_H2',
            'N2', 'std_N2', 'H2S', 'std_H2S', 'AR', 'std_AR', 'O2', 'std_O2',
            'C2', 'std_C2', 'C3', 'std_C3', 'N-C4', 'std_N-C4', 'I-C4', 'std_I-C4',
            'N-C5', 'std_N-C5', 'I-C5', 'std_I-C5', 'C6+', 'std_C6+'
        ];

        const overlayMaps = {};
        const baseURL = 'datasets_leaflet/';

        basins.forEach(basin => {
            components.forEach(component => {
                const filePath = `${baseURL}${basin}/dataset_${component}.csv`;
                const label = `${basin.replace(/_/g, ' ')} - ${component}`;
                const layerGroup = L.layerGroup();
                overlayMaps[label] = layerGroup;

                fetch(filePath)
                    .then(response => {
                        if (!response.ok) throw new Error(`File not found: ${filePath}`);
                        return response.text();
                    })
                    .then(data => {
                        const rows = data.trim().split('\n').slice(1);
                        rows.forEach(row => {
                            const [lon, lat, val] = row.split(',').map(parseFloat);
                            if (isNaN(lat) || isNaN(lon) || isNaN(val)) return;

                            const rectBounds = [
                                [lat - gridSize / 2, lon - gridSize / 2],
                                [lat + gridSize / 2, lon + gridSize / 2]
                            ];
                            const rect = L.rectangle(rectBounds, {
                                color: getColor(val),
                                fillColor: getColor(val),
                                fillOpacity: 0.7,
                                weight: 0
                            }).bindPopup(`${label}: ${val.toFixed(3)}`);
                            layerGroup.addLayer(rect);
                            bounds.extend([lat, lon]);
                        });
                    })
                    .catch(err => console.warn(`Skipping ${label}:`, err));
            });
        });

        // Add layer control after short delay to allow loading
        setTimeout(() => {
            L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);
        }, 1500);

        // Optional: load basin boundaries from GeoJSON
        fetch('basins.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: 'black',
                        weight: 2,
                        fillOpacity: 0
                    }
                }).addTo(map);
            })
            .catch(err => console.warn("No basins.geojson loaded:", err));
    </script>
</body>
</html>
