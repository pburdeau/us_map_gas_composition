<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gas Composition Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/deck.gl@8.9.28/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/layers@8.9.28/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/core@8.9.28/dist.min.js"></script>

  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }
    #tooltip {
      position: absolute;
      background: white;
      padding: 4px;
      font-size: 13px;
      border: 1px solid gray;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="tooltip"></div>

  <script type="module">
    import { Deck } from 'https://unpkg.com/deck.gl@8.9.28/dist.min.mjs';
    import { GeoJsonLayer } from 'https://unpkg.com/@deck.gl/layers@8.9.28/dist.min.mjs';

    const map = new Deck({
      initialViewState: {
        longitude: -102,
        latitude: 38,
        zoom: 5
      },
      controller: true,
      parent: document.getElementById('map'),
      layers: []
    });

    const gridSize = 0.05;
    const tooltip = document.getElementById('tooltip');

    function getColor(value) {
      if (value > 90) return [128, 0, 38];
      if (value > 75) return [189, 0, 38];
      if (value > 60) return [227, 26, 28];
      if (value > 45) return [252, 78, 42];
      if (value > 30) return [253, 141, 60];
      if (value > 15) return [254, 217, 118];
      if (value > 5)  return [255, 255, 178];
      return [255, 255, 204];
    }

    function csvToGeoJSON(csvText) {
      const lines = csvText.trim().split('\n').slice(1);
      const features = [];

      for (const line of lines) {
        const [lon, lat, val] = line.split(',').map(parseFloat);
        if (isNaN(lat) || isNaN(lon) || isNaN(val)) continue;

        const half = gridSize / 2;
        const polygon = [
          [lon - half, lat - half],
          [lon + half, lat - half],
          [lon + half, lat + half],
          [lon - half, lat + half],
          [lon - half, lat - half]
        ];

        features.push({
          type: "Feature",
          properties: { value: val },
          geometry: {
            type: "Polygon",
            coordinates: [polygon]
          }
        });
      }

      return {
        type: "FeatureCollection",
        features: features
      };
    }

    async function loadMapData(csvPath) {
      const csv = await fetch(csvPath).then(r => r.text());
      const geojson = csvToGeoJSON(csv);

      const dataLayer = new GeoJsonLayer({
        id: 'data',
        data: geojson,
        filled: true,
        stroked: false,
        getFillColor: d => getColor(d.properties.value),
        pickable: true,
        opacity: 0.7,
        onHover: info => {
          if (info.object) {
            tooltip.style.display = 'block';
            tooltip.style.left = `${info.x}px`;
            tooltip.style.top = `${info.y}px`;
            tooltip.innerHTML = `Value: ${info.object.properties.value.toFixed(2)}`;
          } else {
            tooltip.style.display = 'none';
          }
        }
      });

      const basinLayer = new GeoJsonLayer({
        id: 'basins',
        data: 'basins.geojson',
        stroked: true,
        filled: false,
        getLineColor: [80, 80, 80],
        getLineWidth: 1
      });

      map.setProps({ layers: [basinLayer, dataLayer] });
    }

    // Change the path here to use a different CSV
    loadMapData('datasets_leaflet/Permian_Basin/dataset_C1.csv');
  </script>
</body>
</html>
