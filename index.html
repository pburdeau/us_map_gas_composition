<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gas Composition Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/proj4@2.8.0/dist/proj4.js"></script>
  <script src="https://unpkg.com/deck.gl@8.9.28/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/layers@8.9.28/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/core@8.9.28/dist.min.js"></script>

  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; position: relative; }
    #tooltip {
      position: absolute;
      background: white;
      padding: 4px;
      font-size: 13px;
      border: 1px solid gray;
      display: none;
      pointer-events: none;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 8px;
      border: 1px solid gray;
      z-index: 1000;
    }
    #loading {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 6px 12px;
      border: 1px solid #888;
      font-size: 14px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="tooltip"></div>
  <div id="loading" style="display:none;">Loading map data…</div>

  <div id="controls">
    <label for="basinSelect">Basin:</label>
    <select id="basinSelect">
      <option value="Permian_Basin">Permian Basin</option>
      <option value="Anadarko_Basin">Anadarko Basin</option>
      <option value="Appalachian_Basin">Appalachian Basin</option>
      <option value="San_Joaquin_Basin">San Joaquin Basin</option>
    </select>
    <label for="componentSelect">Component:</label>
    <select id="componentSelect">
      <option value="C1">C1</option>
      <option value="std_C1">std_C1</option>
      <option value="CO2">CO2</option>
      <option value="std_CO2">std_CO2</option>
      <option value="HE">HE</option>
      <option value="std_HE">std_HE</option>
      <option value="H2S">H2S</option>
      <option value="std_H2S">std_H2S</option>
    </select>
    <button id="loadButton">Load</button>
  </div>

  <script type="module">
    import { Deck, MapView } from 'https://unpkg.com/@deck.gl/core@8.9.28/dist.min.mjs';
    import { GeoJsonLayer } from 'https://unpkg.com/@deck.gl/layers@8.9.28/dist.min.mjs';

    proj4.defs("EPSG:26914", "+proj=utm +zone=14 +datum=NAD83 +units=m +no_defs");

    const gridSize = 5000;
    const tooltip = document.getElementById('tooltip');
    const loading = document.getElementById('loading');

    const map = new Deck({
      parent: document.getElementById('map'),
      views: [new MapView()],
      controller: true,
      initialViewState: {
        longitude: -102,
        latitude: 38,
        zoom: 5
      },
      layers: []
    });

    function getColor(value) {
      if (value > 90) return [128, 0, 38];
      if (value > 75) return [189, 0, 38];
      if (value > 60) return [227, 26, 28];
      if (value > 45) return [252, 78, 42];
      if (value > 30) return [253, 141, 60];
      if (value > 15) return [254, 217, 118];
      if (value > 5)  return [255, 255, 178];
      return [255, 255, 204];
    }

    function csvToGeoJSON(csvText) {
      const lines = csvText.trim().split('\n').slice(1);
      const features = [];
      console.log(`Parsing ${lines.length} lines of CSV data...`);

      for (const line of lines) {
        const [x, y, val] = line.split(',').map(parseFloat);
        if (isNaN(x) || isNaN(y) || isNaN(val)) continue;

        const half = gridSize / 2;
        const [lon1, lat1] = proj4("EPSG:26914", "EPSG:4326", [x - half, y - half]);
        const [lon2, lat2] = proj4("EPSG:26914", "EPSG:4326", [x + half, y + half]);

        const polygon = [
          [lon1, lat1],
          [lon2, lat1],
          [lon2, lat2],
          [lon1, lat2],
          [lon1, lat1]
        ];

        features.push({
          type: "Feature",
          properties: { value: val },
          geometry: {
            type: "Polygon",
            coordinates: [polygon]
          }
        });
      }

      return {
        type: "FeatureCollection",
        features: features
      };
    }

    async function loadMapData(basin, component) {
      try {
        loading.style.display = 'block';
        const csvPath = `datasets_leaflet/${basin}/dataset_${component}.csv`;
        console.log(`Fetching CSV: ${csvPath}`);
        const csv = await fetch(csvPath).then(r => r.text());
        const geojson = csvToGeoJSON(csv);

        const dataLayer = new GeoJsonLayer({
          id: 'data-layer',
          data: geojson,
          filled: true,
          stroked: false,
          getFillColor: d => getColor(d.properties.value),
          pickable: true,
          opacity: 0.7,
          onHover: info => {
            if (info.object) {
              tooltip.style.display = 'block';
              tooltip.style.left = `${info.x}px`;
              tooltip.style.top = `${info.y}px`;
              tooltip.innerHTML = `Value: ${info.object.properties.value.toFixed(3)}`;
            } else {
              tooltip.style.display = 'none';
            }
          }
        });

        const basinsGeojson = await fetch('basins.geojson').then(r => r.json());

        const basinLayer = new GeoJsonLayer({
          id: 'basins',
          data: basinsGeojson,
          stroked: true,
          filled: false,
          getLineColor: [80, 80, 80],
          getLineWidth: 1
        });

        map.setProps({ layers: [basinLayer, dataLayer] });
      } catch (error) {
        console.error("Error loading map data:", error);
        alert("Failed to load map data.");
      } finally {
        loading.style.display = 'none';
      }
    }

    document.getElementById('loadButton').addEventListener('click', () => {
      const basin = document.getElementById('basinSelect').value;
      const component = document.getElementById('componentSelect').value;
      loadMapData(basin, component);
    });

    // Load default
    loadMapData('Permian_Basin', 'C1');
  </script>
</body>
</html>
