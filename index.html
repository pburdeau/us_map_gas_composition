<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gas Composition Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Deck.gl CDN -->
  <script src="https://cdn.jsdelivr.net/npm/deck.gl@8.9.28/dist.min.js"></script>

  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      z-index: 1000;
    }
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: white;
      padding: 4px;
      border: 1px solid gray;
      font-size: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="controls">
    <label for="basin">Basin:</label>
    <select id="basin">
      <option value="Permian_Basin">Permian Basin</option>
      <option value="Anadarko_Basin">Anadarko Basin</option>
    </select>
    <label for="component">Component:</label>
    <select id="component">
      <option value="C1">C1</option>
      <option value="CO2">CO2</option>
      <option value="I-C5">I-C5</option>
    </select>
    <button onclick="loadLayer()">Load</button>
  </div>
  <div id="tooltip"></div>

  <script>
    const tooltip = document.getElementById("tooltip");

    const deckgl = new deck.DeckGL({
      container: 'map',
      mapStyle: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
      initialViewState: {
        longitude: -100,
        latitude: 35,
        zoom: 5,
        pitch: 0,
        bearing: 0
      },
      controller: true,
      layers: []
    });

    function getColor(value) {
      if (value == null || isNaN(value)) return [200, 200, 200];
      if (value > 90) return [128, 0, 38];
      if (value > 75) return [189, 0, 38];
      if (value > 60) return [227, 26, 28];
      if (value > 45) return [252, 78, 42];
      if (value > 30) return [253, 141, 60];
      if (value > 15) return [254, 217, 118];
      if (value > 5)  return [255, 255, 178];
      return [255, 255, 204];
    }

    async function loadLayer() {
      const basin = document.getElementById("basin").value;
      const component = document.getElementById("component").value;
      const path = `datasets_latlon/${basin}/dataset_${component}_epsg4326.csv`;

      const response = await fetch(path);
      const text = await response.text();
      const rows = text.trim().split("\n").slice(1);
      const data = rows.map(line => {
        const [lon, lat, value] = line.split(',').map(Number);
        return { position: [lon, lat], value };
      });

      const layer = new deck.ScatterplotLayer({
        id: 'scatter',
        data,
        getPosition: d => d.position,
        getFillColor: d => getColor(d.value),
        getRadius: 1000,
        radiusMinPixels: 1,
        radiusMaxPixels: 10,
        pickable: true,
        onHover: ({ x, y, object }) => {
          if (object) {
            tooltip.style.left = `${x}px`;
            tooltip.style.top = `${y}px`;
            tooltip.style.display = 'block';
            tooltip.innerHTML = `Value: ${object.value.toFixed(3)}`;
          } else {
            tooltip.style.display = 'none';
          }
        }
      });

      deckgl.setProps({ layers: [layer] });
    }

    // Optional: load something by default
    loadLayer();
  </script>
</body>
</html>
