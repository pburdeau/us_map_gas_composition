<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gas Composition Viewer with UTM Conversion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/proj4@2.8.0/dist/proj4.js"></script>
  <script src="https://unpkg.com/deck.gl@8.9.28/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/layers@8.9.28/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/core@8.9.28/dist.min.js"></script>

  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; position: relative; }
    #tooltip {
      position: absolute;
      background: white;
      padding: 4px;
      font-size: 13px;
      border: 1px solid gray;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="tooltip"></div>

  <script type="module">
    import { Deck, MapView } from 'https://unpkg.com/@deck.gl/core@8.9.28/dist.min.mjs';
    import { GeoJsonLayer } from 'https://unpkg.com/@deck.gl/layers@8.9.28/dist.min.mjs';

    // Define the UTM Zone 14N (EPSG:26914)
    proj4.defs("EPSG:26914", "+proj=utm +zone=14 +datum=NAD83 +units=m +no_defs");

    const gridSize = 5000;  // meters
    const tooltip = document.getElementById('tooltip');

    const map = new Deck({
      parent: document.getElementById('map'),
      views: [new MapView()],
      controller: true,
      initialViewState: {
        longitude: -102,
        latitude: 38,
        zoom: 5
      },
      layers: []
    });

    function getColor(value) {
      if (value > 90) return [128, 0, 38];
      if (value > 75) return [189, 0, 38];
      if (value > 60) return [227, 26, 28];
      if (value > 45) return [252, 78, 42];
      if (value > 30) return [253, 141, 60];
      if (value > 15) return [254, 217, 118];
      if (value > 5)  return [255, 255, 178];
      return [255, 255, 204];
    }

    function csvToGeoJSON(csvText) {
      const lines = csvText.trim().split('\n').slice(1);
      const features = [];

      for (const line of lines) {
        const [x, y, val] = line.split(',').map(parseFloat);
        if (isNaN(x) || isNaN(y) || isNaN(val)) continue;

        // Convert UTM to lon/lat
        const [lon, lat] = proj4("EPSG:26914", "EPSG:4326", [x, y]);

        const half = gridSize / 2;
        const [lon1, lat1] = proj4("EPSG:26914", "EPSG:4326", [x - half, y - half]);
        const [lon2, lat2] = proj4("EPSG:26914", "EPSG:4326", [x + half, y + half]);

        const polygon = [
          [lon1, lat1],
          [lon2, lat1],
          [lon2, lat2],
          [lon1, lat2],
          [lon1, lat1]
        ];

        features.push({
          type: "Feature",
          properties: { value: val },
          geometry: {
            type: "Polygon",
            coordinates: [polygon]
          }
        });
      }

      return {
        type: "FeatureCollection",
        features: features
      };
    }

    async function loadMapData(csvPath) {
      const csv = await fetch(csvPath).then(r => r.text());
      const geojson = csvToGeoJSON(csv);

      const dataLayer = new GeoJsonLayer({
        id: 'data-layer',
        data: geojson,
        filled: true,
        stroked: false,
        getFillColor: d => getColor(d.properties.value),
        pickable: true,
        opacity: 0.7,
        onHover: info => {
          if (info.object) {
            tooltip.style.display = 'block';
            tooltip.style.left = `${info.x}px`;
            tooltip.style.top = `${info.y}px`;
            tooltip.innerHTML = `Value: ${info.object.properties.value.toFixed(3)}`;
          } else {
            tooltip.style.display = 'none';
          }
        }
      });

      const basinLayer = new GeoJsonLayer({
        id: 'basins',
        data: 'basins.geojson',
        stroked: true,
        filled: false,
        getLineColor: [80, 80, 80],
        getLineWidth: 1
      });

      map.setProps({ layers: [basinLayer, dataLayer] });
    }

    // Test it with one converted file
    loadMapData('datasets_leaflet/Permian_Basin/dataset_C1.csv');
  </script>
</body>
</html>
