<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gas Composition Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/deck.gl@8.8.19/dist.min.js"></script>
    <script src="https://unpkg.com/@loaders.gl/core@3.2.9/dist/dist.min.js"></script>
    <script src="https://unpkg.com/@loaders.gl/csv@3.2.9/dist/dist.min.js"></script>
    <style>
      body, html { margin: 0; height: 100%; }
      #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const deckgl = new deck.DeckGL({
        container: 'map',
        mapStyle: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
        initialViewState: {
          latitude: 35.5,
          longitude: -98.5,
          zoom: 5,
          bearing: 0,
          pitch: 0
        },
        controller: true,
        layers: []
      });

      // Adjust these based on 2000m grid (approximate at mid-latitudes)
      const GRID_WIDTH_DEG = 0.02;
      const GRID_HEIGHT_DEG = 0.015;

      async function loadAndPlotCSV(url) {
        const data = await loaders.load(url, loaders.CSVLoader, { csv: { dynamicTyping: true } });

        const layer = new deck.GridLayer({
          id: 'grid-layer',
          data,
          getPosition: d => [d.lon, d.lat],
          getWeight: d => d.value,
          cellSize: [GRID_WIDTH_DEG, GRID_HEIGHT_DEG],
          extruded: true,
          elevationScale: 1000,
          getColorWeight: d => d.value,
          colorAggregation: 'MEAN',
          getColorValue: vals => vals.length ? vals[0] : 0,
          colorRange: [
            [255, 255, 204],
            [161, 218, 180],
            [65, 182, 196],
            [44, 127, 184],
            [37, 52, 148]
          ],
          pickable: true,
        });

        deckgl.setProps({ layers: [layer] });
      }

      // Replace with the actual relative path to your test CSV
      loadAndPlotCSV('datasets_latlon/Anadarko_Basin/dataset_C1_epsg4326.csv');
    </script>
  </body>
</html>
