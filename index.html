<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Anadarko Test Map</title>
    <script src="https://cdn.jsdelivr.net/npm/deck.gl@8.9.29/dist.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@loaders.gl/core@3.4.9/dist.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@loaders.gl/csv@3.4.9/dist.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@loaders.gl/json@3.4.9/dist.min.js"></script>
    <style>
      body { margin: 0; }
      #map { position: absolute; width: 100vw; height: 100vh; }
      #controls {
        position: absolute;
        top: 10px;
        left: 10px;
        background: white;
        padding: 10px;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="controls">
      <label for="componentSelect">Component:</label>
      <select id="componentSelect">
        <option value="C1_epsg4326.csv">C1</option>
        <option value="I-C5_epsg4326.csv">I-C5</option>
      </select>
    </div>
    <script type="module">
      import {Deck} from 'https://cdn.jsdelivr.net/npm/deck.gl@8.9.29/dist.min.mjs';
      import {ScatterplotLayer} from 'https://cdn.jsdelivr.net/npm/@deck.gl/layers@8.9.29/dist.min.mjs';
      import {load} from 'https://cdn.jsdelivr.net/npm/@loaders.gl/core@3.4.9/dist.min.mjs';
      import {CSVLoader} from 'https://cdn.jsdelivr.net/npm/@loaders.gl/csv@3.4.9/dist.min.mjs';

      const mapView = new deck.MapView({repeat: true});
      const INITIAL_VIEW_STATE = {
        longitude: -98.5,
        latitude: 35,
        zoom: 5,
        maxZoom: 15,
        pitch: 0,
        bearing: 0
      };

      const deckgl = new Deck({
        initialViewState: INITIAL_VIEW_STATE,
        views: [mapView],
        container: 'map',
        controller: true,
        layers: []
      });

      async function loadAndPlot(componentFile) {
        const url = `datasets_latlon/Anadarko_Basin/${componentFile}`;
        const data = await load(url, CSVLoader);

        const layer = new ScatterplotLayer({
          id: 'scatterplot',
          data,
          getPosition: d => [parseFloat(d.lon), parseFloat(d.lat)],
          getFillColor: d => {
            const val = parseFloat(d.value);
            const norm = (val - 60) / (90 - 60);  // adjust as needed
            const red = Math.min(255, Math.max(0, 255 * (1 - norm)));
            const green = Math.min(255, Math.max(0, 255 * norm));
            return [red, green, 100, 180];
          },
          getRadius: 200,
          radiusUnits: 'meters',
          pickable: true
        });

        deckgl.setProps({ layers: [layer] });
      }

      const select = document.getElementById('componentSelect');
      select.addEventListener('change', () => loadAndPlot(select.value));
      loadAndPlot(select.value);  // initial load
    </script>
  </body>
</html>
