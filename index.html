<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gas Composition Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
    </style>
    <script type="module">
      import {Deck} from 'https://cdn.skypack.dev/@deck.gl/core';
      import {PolygonLayer} from 'https://cdn.skypack.dev/@deck.gl/layers';
      import {CSVLoader} from 'https://cdn.skypack.dev/@loaders.gl/csv';
      import {load} from 'https://cdn.skypack.dev/@loaders.gl/core';
      import {MapView} from 'https://cdn.skypack.dev/@deck.gl/core';

      const GRID_WIDTH_DEG = 0.02;  // adjust this based on your 2000m spacing at mid-latitudes
      const GRID_HEIGHT_DEG = 0.015;

      const path = "datasets_latlon_test/Anadarko_Basin/dataset_I-C5_epsg4326.csv";

      load(path, CSVLoader).then(data => {
        const features = data.map(d => {
          const lon = parseFloat(d.lon);
          const lat = parseFloat(d.lat);
          const halfWidth = GRID_WIDTH_DEG / 2;
          const halfHeight = GRID_HEIGHT_DEG / 2;

          return {
            polygon: [
              [lon - halfWidth, lat - halfHeight],
              [lon + halfWidth, lat - halfHeight],
              [lon + halfWidth, lat + halfHeight],
              [lon - halfWidth, lat + halfHeight]
            ],
            value: parseFloat(d.value)
          };
        });

        const layer = new PolygonLayer({
          id: 'grid-layer',
          data: features,
          getPolygon: d => d.polygon,
          getFillColor: d => {
            const val = d.value;
            const c = Math.floor(255 * (1 - val));  // simple grayscale mapping
            return [c, c, 255, 180];
          },
          stroked: false,
          pickable: true
        });

        new Deck({
          views: new MapView({repeat: true}),
          initialViewState: {
            longitude: -100,
            latitude: 36,
            zoom: 5,
            pitch: 0,
            bearing: 0
          },
          controller: true,
          layers: [layer]
        });
      });
    </script>
  </head>
  <body>
    <div id="map"></div>
  </body>
</html>
